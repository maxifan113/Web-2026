<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="./style.css" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <div class="image-section">
            <img src="./images/dude.png" width="462" height="501" alt="Dude">
            <h1 class="main-heading">Войти</h1>
        </div>

        <div class="form-section">
            <form action="" method="get" class="form-size">
                <div>
                    <label class="heading-for-fild">Электронная почта</lable>
                    <input type="email" class="input-fild-size">  
                    <span class="description-for-fild">Введите электропочту в формате *****@***.**</span>              
                </div>
                <div>
                    <label class="heading-for-fild">Пароль</lable>
                    <input type="password" class="input-fild-size">
                </div>
                <button type="button" class="button">Продолжить</button>
            </form>
        </div>
    </div>
</body>        
</html>
