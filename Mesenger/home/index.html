<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link href="./styles.css" rel="stylesheet">
</head>
<body class="clear-border-in-body">
    <div class="main-container">
        <nav class="sidebar-fild">
            <div class="pages-fild">
                <img src="image/home-active.png" class="Smart-button" alt="Home">
            </div>

            <div class="pages-fild">
                <a href="http://localhost/Mesenger/profile/"><img src="image/profile.png" class="Smart-button" alt="Profile"></a>
            </div>

            <div class="pages-fild">
                <img src="image/plus.png" class="Smart-button" alt="Add">
            </div>
        </nav>

        <div class="collum-fild">
            <div class="header-fild"></div>
            <div class="lenta-fild">
                <div class="post-fild">
                    <div class="usser">
                        <div class="avatar-name-fild">
                            <img src="image/avatar1.jpg" class="user-avatar-mini" alt="Ваня Денисов">

                        </div>

                        <div class="edit-fild">

                        </div>                        
                    </div>

                    <div class="photo-fild">
                        <img src="image/lenta1.jpg" class="lenta-photo" alt="Photo">
                        <div class="number-container"><span class="number-photo">1/3<span></span></div>
                    </div>

                    <div class="like-fild">
                        <div class="like-image-fild"><img src="image/heart.png" class="like-size" alt="Like"></div>
                        <div class="like-count-fild"><span class="like-count">203</span></div>
                    </div>
                    <div class="coment-fild">
                        <span class="like-count">Так красиво сегодня на улице! Настоящая зима)) Вспоминается Бродский: «Поздно ночью, в уснувшей долине, на самом дне...</span>
                        <span class="help-data">ещё</span>
                    </div>
                    <span class="publishing-time">2 часа назад</span>
                </div>

                <div class="post-fild">
                    <div class="usser">
                        <div class="avatar-name-fild">
                            <img src="image/avatar2.jpg" class="user-avatar-mini" alt="Лиза Дёмина">
                            <div class="usser-name-fild"><span class="usser-name">Лиза Дёмина</span></div>
                        </div>

                        <div class="edit-fild">
                            <img src="image/pen.png" alt="Редактировать">    
                        </div>                        
                    </div>

                    <div class="photo-fild">
                        <img src="image/Lenta2.jpg" class="lenta-photo" alt="Photo">
                    </div>

                    <div class="like-fild">
                        <div class="like-image-fild"><img src="image/heart.png" class="like-size" alt="Like"></div>
                        <div class="like-count-fild"><span class="like-count">100</span></div>
                    </div>
                    <div class="coment-fild">
                        <span class="like-count">Рыбки моей мечты</span>
                    </div>
                    <span class="publishing-time">Менее часа назад</span>
                </div>
